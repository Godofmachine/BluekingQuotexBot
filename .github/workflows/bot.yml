name: Antigravity Bot 24/7

on:
  schedule:
    - cron: '0 */6 * * *' # Auto-restart every 6 hours
  workflow_dispatch:      # Allows you to start it manually from GitHub
  push:
    branches: [ main ]    # Starts every time you update the code

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Trading Engine
        env:
          QUOTEX_EMAIL: ${{ secrets.QUOTEX_EMAIL }}
          QUOTEX_PASSWORD: ${{ secrets.QUOTEX_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ENVIRONMENT: ${{ secrets.ENVIRONMENT }}
        run: |
          # GitHub has a 6-hour limit. 
          # We run the bot for 5 hours and 45 mins (20700 seconds) then stop.
          # The schedule will pick it up again automatically.
          timeout 20700s python main.py || echo "Session finished. Waiting for next schedule."
